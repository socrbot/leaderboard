name: Deploy to Firebase Hosting (v2)

on:
  push:
    branches:
      - v2
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: npm ci && npm run build:staging
        env:
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY_STAGING }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID_STAGING }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_STAGING }}

      - name: Deploy Firestore rules
        run: npx firebase-tools@latest deploy --only firestore:rules --project alumni-golf-tournament-staging --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Deploy to Firebase Hosting (v2 target)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}
          channelId: live
          target: v2
          projectId: alumni-golf-tournament-staging
