name: Deploy to Firebase Hosting (v2)

on:
  push:
    branches:
      - v2
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: npm ci && npm run build
        env:
          REACT_APP_BACKEND_URL: https://leaderboard-backend-628169335141.us-east1.run.app/api
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: alumni-golf-tournament.firebaseapp.com
          REACT_APP_FIREBASE_PROJECT_ID: alumni-golf-tournament
          REACT_APP_FIREBASE_STORAGE_BUCKET: alumni-golf-tournament.appspot.com
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: Deploy to Firebase Hosting (v2 target)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALUMNI_GOLF_TOURNAMENT }}
          target: v2
          projectId: alumni-golf-tournament
